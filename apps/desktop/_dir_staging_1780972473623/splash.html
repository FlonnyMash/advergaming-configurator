<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src 'self'; style-src 'unsafe-inline'"
    />
    <title>Mashed Games Studio</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",
          Arial,
          sans-serif;
        background:
          radial-gradient(120% 80% at 50% 0%, #ffffff 0%, #fafafa 55%, #f4f4f5 100%);
        color: #18181b;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
        width: min(100%, 22rem);
        padding: 2.25rem 2rem 2rem;
        text-align: center;
      }

      .logo-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 5.5rem;
      }

      .logo {
        display: block;
        width: auto;
        max-width: 14.5rem;
        height: auto;
        max-height: 5.5rem;
        object-fit: contain;
      }

      .title {
        font-size: 1.375rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.2;
        color: #18181b;
      }

      .status {
        font-size: 0.875rem;
        line-height: 1.4;
        color: #71717a;
      }

      .progress {
        width: 100%;
        margin-top: 0.25rem;
      }

      .progress-track {
        position: relative;
        width: 100%;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: #e4e4e7;
      }

      .progress-bar {
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #a1a1aa 0%, #52525b 50%, #a1a1aa 100%);
        animation: slide 1.35s ease-in-out infinite;
      }

      @keyframes slide {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(350%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .progress-bar {
          animation: none;
          left: 0;
          width: 100%;
          opacity: 0.55;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-busy="true" aria-live="polite">
      <div class="logo-wrap">
        <img
          class="logo"
          src="splash-logo.png"
          width="235"
          height="81"
          alt="Mashed Games Studio"
          draggable="false"
        />
      </div>
      <h1 class="title">Mashed Games Studio</h1>
      <p class="status">Starting workspace and dashboard…</p>
      <div class="progress" role="progressbar" aria-label="Loading">
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
      </div>
    </main>
  </body>
</html>
