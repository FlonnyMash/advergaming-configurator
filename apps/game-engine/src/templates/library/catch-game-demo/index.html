<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch Game Demo</title>
  </head>
  <body class="min-h-screen bg-slate-950 font-sans text-slate-100 antialiased">
    <div
      id="game-shell"
      class="mx-auto w-full max-w-[360px] shadow-2xl shadow-black/40"
    >
      <div id="game-stage">
        <div id="app"></div>

        <div id="ui-layer" class="pointer-events-none">
          <section
            id="ui-start"
            class="pointer-events-auto flex flex-col items-center justify-center gap-6 bg-slate-950/80 px-6 text-center"
            aria-label="Start screen"
          >
            <div class="flex flex-col gap-3">
              <h1 class="text-3xl font-semibold tracking-tight text-slate-50 sm:text-4xl">
                Catch &amp; Win
              </h1>
              <p class="max-w-xs text-base leading-relaxed text-slate-400">
                Catch items to unlock your reward
              </p>
            </div>
            <button
              id="btn-play"
              type="button"
              class="min-h-12 w-full max-w-xs rounded-xl bg-slate-100 px-8 py-3.5 text-base font-medium text-slate-900 transition-colors hover:bg-white active:bg-slate-200"
            >
              Play Now
            </button>
          </section>

          <section
            id="ui-hud"
            class="pointer-events-none hidden w-full items-start justify-between gap-2 p-3"
            aria-label="Game HUD"
          >
            <div class="rounded-lg bg-slate-900/70 px-3 py-2 backdrop-blur-sm">
              <div class="flex items-baseline gap-2">
                <span class="text-[10px] font-medium uppercase tracking-wider text-slate-500">
                  Score
                </span>
                <span
                  id="hud-score"
                  class="text-lg font-semibold tabular-nums text-slate-50"
                >0</span>
              </div>
              <div class="mt-1 flex items-baseline gap-2 border-t border-slate-700/50 pt-1">
                <span class="text-[10px] font-medium uppercase tracking-wider text-slate-500">
                  Time
                </span>
                <span
                  id="hud-timer"
                  class="text-lg font-semibold tabular-nums text-slate-50"
                >0:30</span>
              </div>
            </div>
            <button
              id="btn-debug-freeze"
              type="button"
              hidden
              class="pointer-events-auto shrink-0 rounded-lg border border-amber-500/60 bg-amber-950/80 px-3 py-2 text-xs font-semibold uppercase tracking-wider text-amber-200 transition-colors hover:border-amber-400 hover:bg-amber-900/90 active:bg-amber-900"
            >
              Freeze
            </button>
          </section>

          <section
            id="ui-gameover"
            class="pointer-events-none hidden items-center justify-center bg-slate-950/80 px-4 py-8"
            aria-label="Game over"
            aria-modal="true"
            role="dialog"
          >
            <div
              class="pointer-events-auto w-full max-w-sm rounded-2xl border border-slate-700/50 bg-slate-900/70 p-6 shadow-xl backdrop-blur-md"
            >
              <p class="text-center text-sm font-medium uppercase tracking-wider text-slate-500">
                Final Score
              </p>
              <p
                id="final-score"
                class="mt-1 text-center text-4xl font-semibold tabular-nums text-slate-50"
              >
                0
              </p>
              <button
                id="btn-retry"
                type="button"
                class="mt-6 min-h-12 w-full rounded-xl border border-slate-500 bg-transparent px-6 py-3.5 text-base font-medium text-slate-100 transition-colors hover:border-slate-400 hover:bg-slate-800/50 active:bg-slate-800"
              >
                Try Again
              </button>
              <p class="mt-6 text-center text-sm leading-relaxed text-slate-400">
                Enter your email to claim your exclusive discount.
              </p>
              <form id="lead-form" class="mt-4 flex flex-col gap-4">
                <label for="lead-email" class="sr-only">Email address</label>
                <input
                  id="lead-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="you@example.com"
                  required
                  class="min-h-12 w-full rounded-xl border border-slate-600 bg-slate-950/50 px-4 text-base text-slate-100 placeholder:text-slate-500 focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400/30"
                />
                <button
                  id="btn-claim"
                  type="submit"
                  class="min-h-12 w-full rounded-xl bg-slate-100 px-6 py-3.5 text-base font-medium text-slate-900 transition-colors hover:bg-white active:bg-slate-200"
                >
                  Claim 15% Off
                </button>
              </form>
            </div>
          </section>
        </div>
      </div>

      <aside
        id="touch-controls"
        class="touch-controls hidden"
        aria-hidden="true"
        aria-label="Player controls"
      >
        <p class="touch-controls__hint">Slide to move the player</p>
        <div
          id="touch-zone"
          class="touch-controls__pad"
          role="slider"
          aria-label="Move player left and right"
          tabindex="0"
        >
          <div id="touch-indicator" class="touch-controls__thumb" aria-hidden="true"></div>
        </div>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
